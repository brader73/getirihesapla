<svg width="64" height="64" viewBox="200 100 650 650" xmlns="http://www.w3.org/2000/svg">
  <!-- KF Monogram - Favicon -->
  <!-- F Gövdesi ve K'nın Alt Bacağı (Navy) -->
  <g stroke="#0A192F" stroke-width="64" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <path d="M 300,300 L 300,700" />
    <path d="M 300,300 L 500,300" />
    <path d="M 300,500 L 450,500" />
    <path d="M 400,500 L 600,700" />
  </g>

  <!-- Bullish Trend Ok'u (K'nın Üst Bacağı - Gold) -->
  <g stroke="#D4AF37" stroke-width="64" stroke-linecap="square" stroke-linejoin="miter" fill="none">
    <path d="M 300,600 L 750,150" />
    <path d="M 550,150 L 750,150 L 750,350" />
  </g>
</svg>
